services:

  # ── Infrastructure ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"   # host port configurable; set REDIS_HOST_PORT in .env if 6379 is taken
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.15
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Microservices ──────────────────────────────────────────
  ingestion-service:
    build:
      context: ./services/ingestion-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  graph-service:
    build:
      context: ./services/graph-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  query-service:
    build:
      context: ./services/query-service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  timeline-service:
    build:
      context: ./services/timeline-service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_HOST_PORT:-8000}:8000"   # host port configurable; set GATEWAY_HOST_PORT in .env if 8000 is taken
    env_file: .env
    depends_on:
      - ingestion-service
      - embedding-service
      - graph-service
      - query-service
      - timeline-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      GATEWAY_URL: http://api-gateway:8000
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  redis_data:
  neo4j_data:
